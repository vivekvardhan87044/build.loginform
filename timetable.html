<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Timetable</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h2>Weekly Timetable</h2>

    <table>
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>

        <tr>
            <td>9:00 - 10:00</td>
            <td>Math</td>
            <td>English</td>
            <td>Science</td>
            <td>History</td>
            <td>Computer</td>
        </tr>

        <tr>
            <td>10:00 - 11:00</td>
            <td>Physics</td>
            <td>Math</td>
            <td>English</td>
            <td>Science</td>
            <td>History</td>
        </tr>

        <tr>
            <td>11:00 - 11:30</td>
            <td colspan="5" class="break">Break</td>
        </tr>

        <tr>
            <td>11:30 - 12:30</td>
            <td>Chemistry</td>
            <td>Biology</td>
            <td>Math</td>
            <td>English</td>
            <td>Science</td>
        </tr>

        <tr>
            <td>12:30 - 1:30</td>
            <td>Computer</td>
            <td>History</td>
            <td>Geography</td>
            <td>Math</td>
            <td>English</td>
        </tr>

    </table>

</body>

</html>
